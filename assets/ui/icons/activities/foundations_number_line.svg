  <line class="number-line-tick" x1="72" y1="72" x2="72" y2="92" stroke="#23415A" stroke-width="7" stroke-linecap="round"/>
  <line class="number-line-tick" x1="96" y1="72" x2="96" y2="92" stroke="#23415A" stroke-width="7" stroke-linecap="round"/>
